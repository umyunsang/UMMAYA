name: Publish Homebrew

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish to the Homebrew tap, without leading v"
        required: true
        type: string

concurrency:
  group: publish-homebrew-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: homebrew
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          package-manager-cache: false

      - name: Resolve version
        id: version
        run: |
          version="${{ inputs.version }}"
          if ! printf '%s' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version: ${version}"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download prebuilt macOS artifacts
        run: |
          version="${{ steps.version.outputs.version }}"
          for arch in arm64 x64; do
            url="https://github.com/umyunsang/UMMAYA/releases/download/v${version}/ummaya-${version}-macos-${arch}.tar.gz"
            curl -fsSL "${url}" -o "ummaya-${version}-macos-${arch}.tar.gz"
            sha256="$(sha256sum "ummaya-${version}-macos-${arch}.tar.gz" | cut -d ' ' -f1)"
            key="UMMAYA_CASK_SHA256_${arch}"
            echo "${key}=${sha256}" >> "${GITHUB_ENV}"
          done

      - name: Render cask
        run: |
          node scripts/render-homebrew-cask.mjs \
            "${{ steps.version.outputs.version }}" \
            "${UMMAYA_CASK_SHA256_arm64}" \
            "${UMMAYA_CASK_SHA256_x64}" \
            Casks/ummaya.rb

      - name: Fetch Homebrew tap token from Infisical
        continue-on-error: true
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLIENT_ID }}
          project-slug: ummaya-3f-zs
          env-slug: prod
          secret-path: "/"
          export-type: env

      - name: Select Homebrew tap credential
        id: tap-credential
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.UMMAYA_HOMEBREW_TAP_SSH_KEY }}
        run: |
          if [ -n "${UMMAYA_HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "mode=token" >> "${GITHUB_OUTPUT}"
          elif [ -n "${HOMEBREW_TAP_SSH_KEY:-}" ]; then
            echo "mode=ssh" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::Missing Homebrew tap credential: set UMMAYA_HOMEBREW_TAP_TOKEN in Infisical or UMMAYA_HOMEBREW_TAP_SSH_KEY as a GitHub Actions environment secret."
            exit 1
          fi

      - name: Checkout tap with token
        if: steps.tap-credential.outputs.mode == 'token'
        uses: actions/checkout@v6
        with:
          repository: umyunsang/homebrew-ummaya
          path: tap
          token: ${{ env.UMMAYA_HOMEBREW_TAP_TOKEN }}

      - name: Checkout tap with deploy key
        if: steps.tap-credential.outputs.mode == 'ssh'
        uses: actions/checkout@v6
        with:
          repository: umyunsang/homebrew-ummaya
          path: tap
          ssh-key: ${{ secrets.UMMAYA_HOMEBREW_TAP_SSH_KEY }}

      - name: Commit cask
        run: |
          mkdir -p tap/Casks
          cp Casks/ummaya.rb tap/Casks/ummaya.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ummaya.rb
          if git diff --cached --quiet; then
            echo "Cask unchanged"
            exit 0
          fi
          git commit -m "ummaya cask ${{ steps.version.outputs.version }}"
          git push
