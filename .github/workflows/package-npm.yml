name: Package npm

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "bin/ummaya"
      - "pyproject.toml"
      - "uv.lock"
      - "src/ummaya/**"
      - "prompts/**"
      - "tui/package.json"
      - "tui/src/**"
      - "docs/plugins/security-review.md"
      - "tests/fixtures/plugin_validation/checklist_manifest.yaml"
      - "Casks/ummaya.rb"
      - "install.sh"
      - "scripts/check-npm-package.mjs"
      - "scripts/build-homebrew-cask-artifact.mjs"
      - "scripts/stage-homebrew-downloads.mjs"
      - "scripts/render-homebrew-cask.mjs"
      - ".github/workflows/package-npm.yml"
      - ".github/workflows/publish-npm.yml"
      - ".github/workflows/publish-homebrew-cask-artifacts.yml"
      - ".github/workflows/publish-homebrew.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-package:
    name: npm Package Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"


      - name: Install npm dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Check package contents
        run: npm run package:check

      - name: Build npm tarball
        run: npm pack --json > package-evidence/npm-pack.json

      - name: Clean global CLI smoke
        run: |
          prefix="${RUNNER_TEMP}/ummaya-prefix"
          tarball="$(node -e "const report = require('./package-evidence/npm-pack.json'); const pack = Array.isArray(report) ? report[0] : report; console.log(pack.filename)")"
          npm install --global --prefix "${prefix}" "./${tarball}"
          "${prefix}/bin/ummaya" --version
          "${prefix}/bin/ummaya" --help >/dev/null
          arbitrary_cwd="${RUNNER_TEMP}/ummaya arbitrary cwd"
          mkdir -p "${arbitrary_cwd}"
          (
            cd "${arbitrary_cwd}"
            UMMAYA_LAUNCHER_INSPECT=1 \
              UMMAYA_BACKEND_CMD_JSON='["stale","backend"]' \
              "${prefix}/bin/ummaya" >"${RUNNER_TEMP}/ummaya-launcher-inspect.json"
          )
          EXPECTED_PACKAGE_ROOT="$(cd "${prefix}/lib/node_modules/ummaya" && pwd -P)" \
            node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const expected = process.env.EXPECTED_PACKAGE_ROOT; if (payload.packageRoot !== expected) throw new Error(`packageRoot ${payload.packageRoot} !== ${expected}`); const command = payload.backendCommand; if (!Array.isArray(command) || !command.includes("--directory") || !command.includes(expected) || !command.includes("--frozen") || !command.includes("--no-dev")) throw new Error(`unexpected backend command ${JSON.stringify(command)}`); if (payload.primitiveTimeoutMs !== "90000") throw new Error(`unexpected primitive timeout ${payload.primitiveTimeoutMs}`);' "${RUNNER_TEMP}/ummaya-launcher-inspect.json"
          if "${prefix}/bin/ummaya" --print "smoke" >"${RUNNER_TEMP}/ummaya-print.out" 2>"${RUNNER_TEMP}/ummaya-print.err"; then
            echo "Expected unauthenticated print mode to fail" >&2
            exit 1
          fi
          grep -q "Not logged in to FriendliAI" "${RUNNER_TEMP}/ummaya-print.err"

      - name: Upload package evidence
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-evidence
          path: |
            package-evidence/*
            *.tgz
          if-no-files-found: error
          retention-days: 90
