name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: npm runtime audit
        run: npm audit --omit=dev --audit-level=high
      - name: Bun TUI audit
        run: |
          cd tui
          bun audit
      - run: uv sync --frozen --all-extras --dev
      - name: pip-audit
        run: uv run pip-audit

  license-check:
    name: License Compliance (Apache-2.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-extras --dev
      - run: uv run pip-licenses --format=json --output-file=licenses.json
      - name: Check license compatibility
        run: |
          uv run python -c "
          import json, sys
          BLOCKED = {'GPL-3.0', 'GPL-2.0', 'AGPL-3.0', 'SSPL-1.0', 'BSL-1.1'}
          with open('licenses.json') as f:
              deps = json.load(f)
          violations = [d for d in deps if d.get('License') in BLOCKED]
          if violations:
              for v in violations:
                  print(f'BLOCKED: {v[\"Name\"]} ({v[\"License\"]})', file=sys.stderr)
              sys.exit(1)
          print(f'All {len(deps)} dependencies have compatible licenses.')
          "
