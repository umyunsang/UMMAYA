name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "scripts/docs_generate.py"
      - "src/ummaya/tools/**"
      - "src/ummaya/primitives/**"
      - "prompts/**"
      - "evidence/scenarios/**"
      - "package.json"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "docs-site/**"
      - "scripts/docs_generate.py"
      - "src/ummaya/tools/**"
      - "src/ummaya/primitives/**"
      - "prompts/**"
      - "evidence/scenarios/**"
      - "package.json"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-deploy:
    name: Generate, build, and deploy docs site
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      UMMAYA_DOCS_SITE: "https://ummaya-docs.pages.dev"
      CLOUDFLARE_ACCOUNT_ID: "657819314c95688d19e6d72cd138927e"
      CLOUDFLARE_PROJECT_NAME: "ummaya-docs"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.5"
      - run: uv sync --frozen --all-extras --dev
      - name: Check generated docs artifacts
        run: uv run python scripts/docs_generate.py --check
      - name: Install docs dependencies
        working-directory: docs-site
        run: bun install --frozen-lockfile
      - name: Build docs
        working-directory: docs-site
        run: bun run build
      - name: Preserve Homebrew cask downloads
        run: |
          node scripts/stage-homebrew-downloads.mjs \
            --root docs-site/dist/downloads/homebrew \
            --preserve-remote
      - name: Verify LLM-readable docs outputs
        run: |
          test -s docs-site/public/llms.txt
          test -s docs-site/public/llms-full.txt
          test -s docs-site/public/_llm/index.json
          test -s docs-site/public/_llm/pages.jsonl
      - name: Deploy docs to Cloudflare Pages
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.91.0"
          workingDirectory: docs-site
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
