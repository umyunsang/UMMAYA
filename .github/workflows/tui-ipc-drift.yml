name: TUI IPC Frame Schema Drift Gate

# FR-003: TypeScript types MUST be derived from Pydantic models.
# contracts/README.md § Authority: CI enforces that the committed
# frames.generated.ts matches the live Pydantic schema exactly.

on:
  pull_request:
    paths:
      - "src/kosmos/ipc/**"
      - "specs/287-tui-ink-react-bun/contracts/**"
      - "tui/src/ipc/frames.generated.ts"
      - "tui/src/ipc/codec.ts"
      - "tui/src/ipc/schema/frame.schema.json"
      - "tui/scripts/gen-ipc-types.ts"
      - "tui/package.json"
      - "tests/ipc/test_codec_envelope_parity.py"
      - "tests/ipc/test_schema_python_ts_diff.py"
  push:
    branches:
      - main
    paths:
      - "src/kosmos/ipc/**"
      - "specs/287-tui-ink-react-bun/contracts/**"
      - "tui/src/ipc/frames.generated.ts"
      - "tui/src/ipc/codec.ts"
      - "tui/src/ipc/schema/frame.schema.json"
      - "tui/scripts/gen-ipc-types.ts"
      - "tui/package.json"
      - "tests/ipc/test_codec_envelope_parity.py"
      - "tests/ipc/test_schema_python_ts_diff.py"

jobs:
  ipc-drift-check:
    name: "FR-003: IPC Frame Schema Drift Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ">=0.5"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Match local development (Bun 1.3.12) — pinned to avoid the
          # CI-only Linux Bun loader regression that drops
          # `isEmptyMessageText` from messages.ts on newer 1.3 patches
          # (see PR #2578 commit history; macOS 1.3.12 unaffected).
          bun-version: "1.3.12"

      - name: Install TUI dependencies
        working-directory: tui
        run: bun install --frozen-lockfile

      - name: Run IPC schema drift check
        working-directory: tui
        run: bun run scripts/gen-ipc-types.ts --check
        env:
          # Ensure Python can import kosmos.ipc
          PYTHONPATH: ${{ github.workspace }}/src

      # Spec 2642 / Epic F · S7 / US3 — codec.ts ↔ Pydantic envelope drift gate.
      # Catches hand-written zod field-level drift that the JSON-Schema parity
      # check above does NOT cover (codec.ts is hand-authored, not generated).
      - name: Run codec.ts ↔ Pydantic envelope parity check
        run: uv run pytest tests/ipc/test_codec_envelope_parity.py -v
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      # Existing JSON-Schema parity gate (also covered by general pytest, but
      # explicit inclusion here ensures the gate runs on TS-only PRs that
      # touch codec.ts but not Python.
      - name: Run frame.schema.json ↔ Pydantic parity check
        run: uv run pytest tests/ipc/test_schema_python_ts_diff.py -v
        env:
          PYTHONPATH: ${{ github.workspace }}/src
