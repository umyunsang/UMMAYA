name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "tests/**"
      - "prompts/**"
      - "tools/**"
      - "tui/**"
      - "specs/**"
      - "docs/**"
      - "Casks/ummaya.rb"
      - "*.md"
      # Required CI contexts must materialize for workflow-only PRs too.
      - ".github/workflows/**"
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen --all-extras --dev
      - name: Ruff check
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: Mypy strict
        run: uv run mypy src
      - name: Validate prompts/manifest.yaml against JSON Schema
        run: |
          uv run python -c "
          import json, sys, yaml
          from pathlib import Path
          from jsonschema import validate
          manifest = yaml.safe_load(Path('prompts/manifest.yaml').read_text())
          schema = json.loads(Path('specs/026-cicd-prompt-registry/contracts/prompts-manifest.schema.json').read_text())
          validate(instance=manifest, schema=schema)
          print('prompts/manifest.yaml validates against schema')
          "

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      OTEL_SDK_DISABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --all-extras --dev
      - name: Secrets audit (block long-lived tokens in workflows)
        run: ./scripts/audit-secrets.sh
      - name: Fetch secrets from Infisical (OIDC federation)
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995  # v1.0.16
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_CLIENT_ID }}
          project-slug: ummaya-3f-zs
          env-slug: dev
          secret-path: "/"
          export-type: env
      - name: Run tests with coverage
        run: uv run pytest -n auto --cov=src/ummaya --cov-report=xml -m "not live"
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  dead-code:
    name: Dead Code Detection
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --all-extras --dev
      - run: uv run vulture src vulture_whitelist.py --min-confidence 80

  parity-audit:
    name: LLM Swap-Surface Parity Audit (Spec 2521)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.title, '2521') ||
      contains(toJson(github.event.pull_request.labels.*.name), '2521') ||
      true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run parity audit
        run: |
          chmod +x scripts/llm_swap_parity_audit.sh
          # The audit reads .references/claude-code-sourcemap/ which is .gitignored
          # (the upstream CC source is fetched locally by developers and never
          # committed). On CI runners that path is absent, in which case the
          # audit job emits a non-failing "skipped" notice rather than blocking
          # merges on a precondition that only exists on developer machines.
          if [ ! -d .references/claude-code-sourcemap/restored-src ]; then
            echo "::notice::Parity audit skipped — .references/claude-code-sourcemap/ is .gitignored (developer-local only). Audit + replay self-test are run locally before push; CI verifies via TUI typecheck + tests + boot smoke instead."
            echo '{"verdict":"skipped","reason":"cc_source_unavailable_on_ci","exit_code":0}' > parity-audit-result.json
            exit 0
          fi
          scripts/llm_swap_parity_audit.sh --strict --json | tee parity-audit-result.json
          exit_code=$(jq '.exit_code' parity-audit-result.json)
          verdict=$(jq -r '.verdict' parity-audit-result.json)
          echo "Parity audit verdict: $verdict (exit $exit_code)"
          if [ "$exit_code" != "0" ]; then
            echo "::error::Parity audit DRIFT detected — see parity-audit-result.json"
            exit "$exit_code"
          fi
      - name: Upload parity audit result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-audit-result
          path: parity-audit-result.json

  docker-build:
    name: Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build -f docker/Dockerfile -t ummaya:ci .
      - name: Build live adapter gateway image
        run: docker build -f docker/Dockerfile.gateway -t ummaya-live-gateway:ci .
      - name: Verify image size <= 2 GB
        run: |
          size_bytes=$(docker inspect ummaya:ci --format='{{.Size}}')
          max_bytes=$((2 * 1024 * 1024 * 1024))
          echo "Image size: $size_bytes bytes (limit: $max_bytes bytes)"
          if [ "$size_bytes" -gt "$max_bytes" ]; then
            echo "::error::Image size $size_bytes exceeds 2 GB limit"
            exit 1
          fi
          gateway_size_bytes=$(docker inspect ummaya-live-gateway:ci --format='{{.Size}}')
          echo "Gateway image size: $gateway_size_bytes bytes (limit: $max_bytes bytes)"
          if [ "$gateway_size_bytes" -gt "$max_bytes" ]; then
            echo "::error::Gateway image size $gateway_size_bytes exceeds 2 GB limit"
            exit 1
          fi
      - name: Verify non-root user is UID 1000
        run: |
          uid_in_container=$(docker run --rm --entrypoint id ummaya:ci -u)
          echo "Container UID: $uid_in_container"
          if [ "$uid_in_container" != "1000" ]; then
            echo "::error::Expected UID 1000, got $uid_in_container"
            exit 1
          fi
          gateway_uid_in_container=$(docker run --rm --entrypoint id ummaya-live-gateway:ci -u)
          echo "Gateway container UID: $gateway_uid_in_container"
          if [ "$gateway_uid_in_container" != "1000" ]; then
            echo "::error::Expected gateway UID 1000, got $gateway_uid_in_container"
            exit 1
          fi
      - name: Smoke test live adapter gateway health endpoint
        run: |
          container_id="$(
            docker run -d -p 8123:8080 \
              -e UMMAYA_DATA_GO_KR_API_KEY=ci-dummy-data-go-kr \
              -e UMMAYA_KAKAO_API_KEY=ci-dummy-kakao \
              -e UMMAYA_JUSO_CONFM_KEY=ci-dummy-juso \
              -e UMMAYA_SGIS_KEY=ci-dummy-sgis-key \
              -e UMMAYA_SGIS_SECRET=ci-dummy-sgis-secret \
              ummaya-live-gateway:ci
          )"
          cleanup() {
            docker logs "${container_id}" || true
            docker rm -f "${container_id}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8123/readyz; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Gateway health endpoint did not become ready"
          exit 1
