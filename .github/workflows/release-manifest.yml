name: release-manifest

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: read   # to read GHCR digests if needed

jobs:
  build-manifest:
    name: Build & Commit Release Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (lockfile drift gate — FR-E04)
        run: uv sync --frozen

      - name: Compute uv.lock hash
        run: |
          UV_LOCK_HASH="sha256:$(sha256sum uv.lock | cut -d' ' -f1)"
          echo "UV_LOCK_HASH=$UV_LOCK_HASH" >> "$GITHUB_ENV"

      - name: Build docker image and capture digest
        # GHCR push is deferred to Epic #468; until then, compute the local image
        # content-address via `docker image inspect --format '{{.Id}}'`, which
        # yields `sha256:<64hex>` matching the ReleaseManifest docker_digest
        # validator.  The digest is still cryptographically bound to the image
        # bytes produced from this commit — swapping GHCR push in later does not
        # change the schema contract.
        run: |
          docker build -f docker/Dockerfile -t ummaya:release .
          DOCKER_DIGEST=$(docker image inspect ummaya:release --format '{{.Id}}')
          echo "DOCKER_DIGEST=$DOCKER_DIGEST" >> "$GITHUB_ENV"

      - name: Resolve Friendli model id
        # Epic #468 (env registry) will formalize this key.  Until then, allow
        # `vars.FRIENDLI_MODEL_ID` override with the documented default from
        # AGENTS.md / plan.md.  The default matches the schema pattern
        # `<vendor>/<model>` so the ReleaseManifest validator passes even when
        # the repo-level variable is not configured.
        run: |
          FRIENDLI_MODEL_ID="${{ vars.FRIENDLI_MODEL_ID || 'LGAI-EXAONE/EXAONE-3.5-32B-Instruct' }}"
          echo "FRIENDLI_MODEL_ID=$FRIENDLI_MODEL_ID" >> "$GITHUB_ENV"

      - name: Emit prompt hashes
        run: |
          mkdir -p docs/release-manifests
          uv run python -m ummaya.context.prompt_loader --emit-hashes > /tmp/prompt_hashes.json

      - name: Verify required release inputs
        run: |
          : "${DOCKER_DIGEST:?DOCKER_DIGEST must be set (sha256:<64-hex>) for release manifest}"
          : "${FRIENDLI_MODEL_ID:?FRIENDLI_MODEL_ID must be set (LGAI-EXAONE/...) for release manifest}"

      - name: Render release manifest
        run: |
          uv run python -m tools.release_manifest.render \
            --commit-sha "$GITHUB_SHA" \
            --uv-lock-hash "$UV_LOCK_HASH" \
            --docker-digest "$DOCKER_DIGEST" \
            --prompt-hashes-file /tmp/prompt_hashes.json \
            --friendli-model-id "$FRIENDLI_MODEL_ID" \
            --litellm-proxy-version unknown \
            --out "docs/release-manifests/${GITHUB_SHA}.yaml"

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest-${{ github.ref_name }}-${{ github.sha }}
          path: docs/release-manifests/${{ github.sha }}.yaml
          if-no-files-found: error
          retention-days: 90
