name: SBOM Generation

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - .github/syft-sbom.yaml
      - .github/workflows/sbom.yml
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate SBOM (SPDX 2.3 + CycloneDX 1.6)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies (lockfile authoritative)
        run: uv sync --frozen --all-extras --dev

      - name: Generate SPDX 2.3 SBOM (run 1)
        uses: anchore/sbom-action@v0
        with:
          path: .
          config: .github/syft-sbom.yaml
          format: spdx-json
          output-file: sbom-spdx-run1.json
          upload-artifact: false

      - name: Generate CycloneDX 1.6 SBOM (run 1)
        uses: anchore/sbom-action@v0
        with:
          path: .
          config: .github/syft-sbom.yaml
          format: cyclonedx-json
          output-file: sbom-cyclonedx-run1.json
          upload-artifact: false

      - name: Generate SPDX 2.3 SBOM (run 2 — divergence detection)
        uses: anchore/sbom-action@v0
        with:
          path: .
          config: .github/syft-sbom.yaml
          format: spdx-json
          output-file: sbom-spdx-run2.json
          upload-artifact: false

      - name: Generate CycloneDX 1.6 SBOM (run 2 — divergence detection)
        uses: anchore/sbom-action@v0
        with:
          path: .
          config: .github/syft-sbom.yaml
          format: cyclonedx-json
          output-file: sbom-cyclonedx-run2.json
          upload-artifact: false

      # FR-019: Build-gate-on-divergence — SBOM mismatch between generator runs
      # fails the build. Recovery requires deliberate regeneration with a
      # reviewer-authored note. Non-deterministic fields (timestamps, document
      # UUIDs, tool-version metadata) are stripped by jq before diffing.
      # Reference: specs/024-tool-security-v1/research.md §3.7 "Supply-chain posture"
      - name: Divergence gate — SPDX (FR-019)
        env:
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          # Normalise syft's per-run non-determinism so the gate flags
          # genuine lockfile drift, not tool-internal ID reshuffling:
          #   - strip timestamp + document UUID + root SPDXID
          #   - strip the `-<16-hex>` hash suffix syft appends to every
          #     `SPDXRef-Package-<name>-<hash>` identifier (the same
          #     package can receive different hashes across runs when
          #     catalogers visit paths in different order)
          #   - sort the `packages` and `relationships` arrays so ordering
          #     is not a divergence signal
          strip_spdx() {
            jq '
              del(.creationInfo.created, .documentNamespace, .SPDXID)
              | (.. | strings) |= gsub("(?<p>SPDXRef-Package-[^\"\\s,]+?)-(?<h>[0-9a-f]{16})(?<t>\"|\\b)"; "\(.p)\(.t)")
              | (.. | strings) |= gsub("package-id=(?<h>[0-9a-f]{16})"; "package-id=STRIPPED")
              | .packages |= (sort_by(.name, .versionInfo) | unique_by(.name, .versionInfo))
              | .relationships |= (sort_by(.spdxElementId, .relatedSpdxElement, .relationshipType) | unique_by(.spdxElementId, .relatedSpdxElement, .relationshipType))
            ' "$1"
          }
          # FR-019 escape hatch: PRs that intentionally change the
          # lockfile + carry the sentinel `[sbom-lock-change-ok]` in any
          # commit message warn instead of failing. Reviewers must still
          # eyeball the SBOM diff in the PR description; the sentinel is
          # the deliberate-regen acknowledgement the gate's error message
          # has always asked for.
          # PR builds checkout a synthetic merge commit whose message
          # never carries our sentinel. Read PR title/body context AND
          # any reachable commit messages so manual reruns / push
          # events both work.
          GIT_LOG_MSGS=$(git log -50 HEAD --format=%B 2>/dev/null || true)
          if printf '%s\n%s\n%s\n%s\n' "$PR_TITLE" "$PR_BODY" "$HEAD_COMMIT_MSG" "$GIT_LOG_MSGS" | grep -qF "[sbom-lock-change-ok]"; then
            BYPASS=1
          else
            BYPASS=0
          fi
          if diff <(strip_spdx sbom-spdx-run1.json) <(strip_spdx sbom-spdx-run2.json); then
            echo "SPDX divergence gate: PASS"
          else
            if [ "$BYPASS" = "1" ]; then
              echo "WARNING: SPDX 2.3 SBOM diverged between runs (FR-019). Bypassed via [sbom-lock-change-ok] sentinel.";
            else
              echo "ERROR: SPDX 2.3 SBOM diverged between runs (FR-019)."
              echo "       Regenerate with a deliberate lockfile change and a reviewer note."
              echo "       Or add [sbom-lock-change-ok] to a PR commit message."
              exit 1
            fi
          fi

      - name: Divergence gate — CycloneDX (FR-019)
        env:
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          # Same normalisation rationale as the SPDX gate above —
          # CycloneDX also carries per-run UUID suffixes on
          # bom-ref identifiers.  Strip them + sort components + deps.
          strip_cdx() {
            jq '
              del(.metadata.timestamp, .serialNumber, .metadata.tools)
              | (.. | strings) |= gsub("(?<p>[^\"\\s]+?)-(?<h>[0-9a-f]{16})(?<t>\"|\\b)"; "\(.p)\(.t)")
              | (.. | strings) |= gsub("package-id=(?<h>[0-9a-f]{16})"; "package-id=STRIPPED")
              | (.components // []) |= (sort_by(.name, .version) | unique_by(.name, .version))
              | (.dependencies // []) |= (
                  map(.dependsOn |= (. // [] | sort | unique))
                  | sort_by(.ref) | unique_by(.ref)
                )
            ' "$1"
          }
          # Same FR-019 escape hatch as SPDX (see above).
          # PR builds checkout a synthetic merge commit whose message
          # never carries our sentinel. Read PR title/body context AND
          # any reachable commit messages so manual reruns / push
          # events both work.
          GIT_LOG_MSGS=$(git log -50 HEAD --format=%B 2>/dev/null || true)
          if printf '%s\n%s\n%s\n%s\n' "$PR_TITLE" "$PR_BODY" "$HEAD_COMMIT_MSG" "$GIT_LOG_MSGS" | grep -qF "[sbom-lock-change-ok]"; then
            BYPASS=1
          else
            BYPASS=0
          fi
          if diff <(strip_cdx sbom-cyclonedx-run1.json) <(strip_cdx sbom-cyclonedx-run2.json); then
            echo "CycloneDX divergence gate: PASS"
          else
            if [ "$BYPASS" = "1" ]; then
              echo "WARNING: CycloneDX 1.6 SBOM diverged between runs (FR-019). Bypassed via [sbom-lock-change-ok] sentinel.";
            else
              echo "ERROR: CycloneDX 1.6 SBOM diverged between runs (FR-019)."
              echo "       Regenerate with a deliberate lockfile change and a reviewer note."
              echo "       Or add [sbom-lock-change-ok] to a PR commit message."
              exit 1
            fi
          fi

      - name: Promote final SBOM artifacts
        run: |
          cp sbom-spdx-run1.json sbom-spdx.json
          cp sbom-cyclonedx-run1.json sbom-cyclonedx.json

      - name: Upload SPDX 2.3 SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-spdx.json
          path: sbom-spdx.json
          retention-days: 90

      - name: Upload CycloneDX 1.6 SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx.json
          path: sbom-cyclonedx.json
          retention-days: 90

      # TODO(spec 024 §3.8): invoke sigstore cosign sign-blob when signing infra lands.
      # Rekor transparency-log attestation is explicitly deferred per research.md §3.8.
      # Tracking: open a follow-up issue under Epic #612 before any ministry-pilot launch.
      - name: Sign SBOM (stub)
        run: |
          echo "# TODO(spec 024 §3.8): invoke sigstore cosign sign-blob when signing infra lands"
