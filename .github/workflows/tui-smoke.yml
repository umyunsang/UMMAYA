name: TUI Boot Smoke Gate

# Catches React 19 selector-identity regressions, duplicate-key warnings, and
# broken entrypoint wiring that only surface when the TUI boots under a real
# TTY. Driven by tui/scripts/tui-smoke.ts (see that file for the failure
# criteria and fake-backend strategy).

on:
  pull_request:
    paths:
      - "tui/**"
      - ".github/workflows/tui-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "tui/**"
      - ".github/workflows/tui-smoke.yml"

jobs:
  tui-smoke:
    name: "TUI typecheck + unit tests + PTY boot smoke"
    runs-on: ubuntu-latest
    # Hard ceiling — the smoke script itself bounds at BOOT_MS + grace, so the
    # job should finish in ~30 s. Protect against a runaway on a bad runner.
    timeout-minutes: 5

    # kosmos.config.guard.verify_startup() exits 78 (EX_CONFIG) when the three
    # required KOSMOS_* tokens are missing. The bridge integration test spawns
    # the real backend via `uv run kosmos --ipc stdio` — but the stdio echo
    # loop never performs an LLM call or data.go.kr request, so dummy
    # placeholders are sufficient to pass the guard without leaking secrets
    # into the workflow. Live-API tests are gated by `@pytest.mark.live` and
    # do not run here.
    env:
      KOSMOS_ENV: ci
      KOSMOS_KAKAO_API_KEY: ci-dummy-kakao-key
      KOSMOS_FRIENDLI_TOKEN: ci-dummy-friendli-token
      KOSMOS_DATA_GO_KR_API_KEY: ci-dummy-data-go-kr-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned 1.3.12 (developer's local). CI's `1.3.x` floating tag
          # was occasionally serving a newer Bun patch whose Linux loader
          # rejects `tui/src/utils/messages.ts` with a SyntaxError that
          # macOS 1.3.12 does NOT see. Spec 2521 PR #2578 hit this 5
          # times in a row. Pin until the loader bug is filed upstream
          # and a stable patch tag is identified.
          bun-version: "1.3.12"

      - name: Set up Python (for bridge/crash-detector integration tests)
        # tui/tests/ipc/bridge.test.ts + crash.test.ts spawn the real
        # `uv run kosmos --ipc stdio` echo backend — not a mock — to verify
        # the stdio JSONL contract end-to-end. Skipping Python here would
        # force those tests into a mocked half-world and mask backend drift.
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python dependencies (`uv sync`)
        # Installs the `kosmos` console script used by createBridge's default
        # cmd (`uv run kosmos --ipc stdio`). Frozen against uv.lock so CI
        # only ever runs against pinned versions.
        run: uv sync --frozen

      - name: Install util-linux `script` (PTY harness)
        # ubuntu-latest images ship util-linux, but guarantee presence so the
        # gate fails loudly with a clear error if the image drifts.
        run: |
          which script || (sudo apt-get update && sudo apt-get install -y bsdmainutils util-linux)
          script --version

      - name: Install canvas/pdf-to-img system deps (Spec 1635 → 1636)
        # Spec 1635 added `pdf-to-img` for inline PDF rendering (UI-B.3.a),
        # which transitively depends on `node-canvas`. node-canvas distributes
        # prebuilt binaries via `prebuild-install`, but on hosted runners with
        # cache-cold node-gyp the prebuilt detection occasionally misses
        # (target=napi target=7 libc=<empty> heuristic) and falls back to a
        # source build. The source build needs cairo + pixman + pango + libjpeg
        # + libgif + librsvg dev headers — without them the install fails with
        # `Package 'pixman-1', required by 'virtual:world', not found`.
        # Installing these unconditionally costs ~10 s and removes a recurrent
        # CI flake; the prebuilt fast path is a no-op for the deps.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpixman-1-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev \
            pkg-config

      - name: Install TUI dependencies
        working-directory: tui
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: tui
        run: bun run typecheck

      - name: Unit tests
        working-directory: tui
        # Use `bun run test` so the package.json script (narrowed to dirs
        # that survive the Epic #1632 CC port) is respected. `bun test`
        # without args would sweep every *.test.ts, including KOSMOS-native
        # tests (LogoV2, onboarding, commands, components, keybindings)
        # that reference files renamed/deleted by the CC 2.1.88 port. Epic
        # #1633 will decide whether to forward-port or delete those tests.
        run: bun run test

      - name: PTY boot smoke
        working-directory: tui
        env:
          # Slightly longer boot window on shared CI runners.
          KOSMOS_TUI_SMOKE_BOOT_MS: "5000"
        run: bun run tui:smoke
