name: Publish npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build npm Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"

      - name: README env table sync check
        run: uv run python scripts/sync_readme_env.py --check

      - name: Install npm CLI
        run: npm install --global npm@11.5.1

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Check package contents
        run: npm run package:check

      - name: Build npm tarball
        run: npm pack --json > package-evidence/npm-pack.json

      - name: Clean global CLI smoke
        run: |
          prefix="${RUNNER_TEMP}/ummaya-prefix"
          tarball="$(node -e "const report = require('./package-evidence/npm-pack.json'); const pack = Array.isArray(report) ? report[0] : report; console.log(pack.filename)")"
          npm install --global --prefix "${prefix}" "./${tarball}"
          "${prefix}/bin/ummaya" --version

      - name: Record distribution hashes
        run: |
          tarball="$(node -e "const report = require('./package-evidence/npm-pack.json'); const pack = Array.isArray(report) ? report[0] : report; console.log(pack.filename)")"
          sha256sum "${tarball}" | tee package-evidence/SHA256SUMS

      - name: Upload npm distribution
        uses: actions/upload-artifact@v7
        with:
          name: npm-dist
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 90

      - name: Upload package evidence
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-evidence
          path: package-evidence/*
          if-no-files-found: error
          retention-days: 90

  attest:
    name: Attest npm Distribution
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Retrieve npm distribution
        uses: actions/download-artifact@v5
        with:
          name: npm-dist
          path: dist/

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"

  publish:
    name: Publish npm Package
    needs:
      - build
      - attest
    if: github.ref_type == 'tag' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@11.5.1

      - name: Check npm version availability
        id: npm-version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${package_name}@${package_version} already exists; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with npm Trusted Publishing
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish
