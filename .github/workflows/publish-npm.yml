name: Publish npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build npm Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: "3.12"


      - name: Install npm CLI
        run: npm install --global npm@11.14.1

      - name: Install npm dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Check package contents
        run: npm run package:check

      - name: Build npm tarball
        run: npm pack --json > package-evidence/npm-pack.json

      - name: Clean global CLI smoke
        run: |
          prefix="${RUNNER_TEMP}/ummaya-prefix"
          tarball="$(node -e "const report = require('./package-evidence/npm-pack.json'); const pack = Array.isArray(report) ? report[0] : report; console.log(pack.filename)")"
          npm install --global --prefix "${prefix}" "./${tarball}"
          "${prefix}/bin/ummaya" --version
          "${prefix}/bin/ummaya" --help >/dev/null
          arbitrary_cwd="${RUNNER_TEMP}/ummaya arbitrary cwd"
          mkdir -p "${arbitrary_cwd}"
          (
            cd "${arbitrary_cwd}"
            UMMAYA_LAUNCHER_INSPECT=1 \
              UMMAYA_BACKEND_CMD_JSON='["stale","backend"]' \
              "${prefix}/bin/ummaya" >"${RUNNER_TEMP}/ummaya-launcher-inspect.json"
          )
          EXPECTED_PACKAGE_ROOT="$(cd "${prefix}/lib/node_modules/ummaya" && pwd -P)" \
            node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const expected = process.env.EXPECTED_PACKAGE_ROOT; if (payload.packageRoot !== expected) throw new Error(`packageRoot ${payload.packageRoot} !== ${expected}`); const command = payload.backendCommand; if (!Array.isArray(command) || !command.includes("--directory") || !command.includes(expected) || !command.includes("--frozen") || !command.includes("--no-dev")) throw new Error(`unexpected backend command ${JSON.stringify(command)}`); if (payload.primitiveTimeoutMs !== "90000") throw new Error(`unexpected primitive timeout ${payload.primitiveTimeoutMs}`);' "${RUNNER_TEMP}/ummaya-launcher-inspect.json"
          if "${prefix}/bin/ummaya" --print "smoke" >"${RUNNER_TEMP}/ummaya-print.out" 2>"${RUNNER_TEMP}/ummaya-print.err"; then
            echo "Expected unauthenticated print mode to fail" >&2
            exit 1
          fi
          grep -q "Not logged in to FriendliAI" "${RUNNER_TEMP}/ummaya-print.err"

      - name: Record distribution hashes
        run: |
          tarball="$(node -e "const report = require('./package-evidence/npm-pack.json'); const pack = Array.isArray(report) ? report[0] : report; console.log(pack.filename)")"
          sha256sum "${tarball}" | tee package-evidence/SHA256SUMS

      - name: Upload npm distribution
        uses: actions/upload-artifact@v7
        with:
          name: npm-dist
          path: "*.tgz"
          if-no-files-found: error
          retention-days: 90

      - name: Upload package evidence
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-evidence
          path: package-evidence/*
          if-no-files-found: error
          retention-days: 90

  attest:
    name: Attest npm Distribution
    needs: build
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Retrieve npm distribution
        uses: actions/download-artifact@v8
        with:
          name: npm-dist
          path: dist/

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"

  publish:
    name: Publish npm Package
    needs:
      - build
      - attest
    if: (github.ref_type == 'tag' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm CLI
        run: npm install --global npm@11.14.1

      - name: Check npm version availability
        id: npm-version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${package_name}@${package_version} already exists; skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with npm Trusted Publishing
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish
