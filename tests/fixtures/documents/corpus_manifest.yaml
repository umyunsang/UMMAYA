requirements:
  source: "Every fixture entry must declare provenance and redistribution status."
  expected_fields: "Public-form and narrative fixtures must declare expected fields or prompts plus layout anchors."
  hash_and_size: "Every production fixture entry must declare size_bytes and sha256; metadata-only entries record the metadata artifact hash."
  authoring_flow: "Every production fixture entry must declare its expected authoring flow and protected-field expectations."
  negative_cases: "Hostile fixtures must declare the intake rule expected to block them."
